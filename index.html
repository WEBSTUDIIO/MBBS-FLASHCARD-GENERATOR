<!DOCTYPE html>
<html>
<head>
  <title>Med Flashcards AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 3D Background -->
  <canvas id="bg"></canvas>

  <div class="content">
    <h1>🧠 Med Flashcards AI</h1>

    <div id="output"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
